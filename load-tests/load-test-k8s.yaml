# load-test-k8s.yaml
# Runs k6 as a Kubernetes Job inside the cluster, hitting the app via its
# ClusterIP service name. This bypasses kubectl port-forward entirely and
# measures the app's actual capacity instead of the proxy's.

# ConfigMap holds the same k6 script we already have on disk
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
  namespace: books
data:
  load-test.js: |
    import http from 'k6/http';
    import { check, sleep } from 'k6';
    import { Counter, Rate } from 'k6/metrics';

    const errors = new Counter('errors');
    const errorRate = new Rate('error_rate');

    export const options = {
      stages: [
        { duration: '15s', target: 500 },
        { duration: '60s', target: 500 },
        { duration: '10s', target: 0 },
      ],
      thresholds: {
        http_req_duration: ['p(95)<2000'],
        http_req_failed: ['rate<0.05'],
      },
    };

    // Inside the cluster we hit the service by its name.
    const BASE_URL = __ENV.BASE_URL || 'http://app.books.svc.cluster.local:3000';

    export default function () {
      const r = Math.random();
      if (r < 0.8) {
        const res = http.get(`${BASE_URL}/books`);
        const ok = check(res, {
          'GET /books status is 200': (r) => r.status === 200,
          'GET /books returns array': (r) => Array.isArray(r.json()),
        });
        if (!ok) { errors.add(1); errorRate.add(1); } else { errorRate.add(0); }
      } else {
        const payload = JSON.stringify({
          title: `Book ${Math.floor(Math.random() * 100000)}`,
          author: 'Load Tester',
          published_year: 2026,
        });
        const res = http.post(`${BASE_URL}/books`, payload, { headers: { 'Content-Type': 'application/json' } });
        const ok = check(res, { 'POST /books status is 201': (r) => r.status === 201 });
        if (!ok) { errors.add(1); errorRate.add(1); } else { errorRate.add(0); }
      }
      sleep(0.5);
    }
---
# The Job runs k6 once and finishes
apiVersion: batch/v1
kind: Job
metadata:
  name: k6-load-test
  namespace: books
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: k6
          image: grafana/k6:latest
          command: ["k6", "run", "/scripts/load-test.js"]
          volumeMounts:
            - name: script
              mountPath: /scripts
      volumes:
        - name: script
          configMap:
            name: k6-script